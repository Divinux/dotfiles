[metadata]
name = "srsGreen"
author = "Divinux"
origin_url = "hhttps://github.com/Divinux/dotfiles"

[colors]
foreground = "#c0c9c0"
background = "#0f1511"

cursor_fg = "#0f1511"
cursor_bg = "#c0c9c0"
cursor_border = "#0f1511"
compose_cursor = "#c0c9c0"

selection_fg = "#c0c9c0"
selection_bg = "#b5ccba"

split = "#b5ccba"
scrollbar_thumb = "#b5ccba"
visual_bell = "#c0c9c0"

ansi = [
    "#2a2d2b",
    "#333a34",
    "#3c463d", #low%
    "#465346",
    "#4f5f4e",
    "#586c57",
    "#617860",
    "#6b8569"
]

brights = [
    "#6a8469",
    "#516452", # high%
    "#425044", # : and categories
    "#3a443d", # ~ and mid%
    "#363d38", # $ and time
    "#333935",
    "#313733",
    "#303531" # headlines
]

[colors.tab_bar]
background = "#2a2d2b"
inactive_tab_edge = "#2a2d2b"
inactive_tab_edge_hover = "#2a2d2b"

[colors.tab_bar.active_tab]
bg_color = "#0f1511"
fg_color = "#c0c9c0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#333a34"
fg_color = "#c0c9c0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#586c57"
fg_color = "#0f1511"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#333a34"
fg_color = "#c0c9c0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#586c57"
fg_color = "#0f1511"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"


